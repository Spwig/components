<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="200" height="200" viewBox="0 0 200 200">
    <!-- Open Exchange Rates Logo -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle cx="100" cy="100" r="95" fill="url(#grad1)"/>

    <!-- Currency symbol $ -->
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="120" font-weight="bold"
          fill="white" text-anchor="middle">$</text>

    <!-- Exchange arrows circle -->
    <g transform="translate(100, 100)">
        <!-- Circular arrow indicating exchange -->
        <path d="M 0,-60 A 60,60 0 0,1 52,-30" fill="none" stroke="white" stroke-width="8"
              stroke-linecap="round" opacity="0.8"/>
        <path d="M 52,-30 L 60,-40 L 58,-25 Z" fill="white" opacity="0.8"/>

        <path d="M 0,60 A 60,60 0 0,1 -52,30" fill="none" stroke="white" stroke-width="8"
              stroke-linecap="round" opacity="0.8"/>
        <path d="M -52,30 L -60,40 L -58,25 Z" fill="white" opacity="0.8"/>
    </g>
</svg>
