<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Custom API Logo -->
  <defs>
    <linearGradient id="customGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#customGrad)"/>

  <!-- API Icon - Code brackets and connection -->
  <g transform="translate(100, 100)">
    <!-- Left Bracket -->
    <path d="M -50 -30 L -60 -30 L -70 -20 L -70 20 L -60 30 L -50 30"
          stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right Bracket -->
    <path d="M 50 -30 L 60 -30 L 70 -20 L 70 20 L 60 30 L 50 30"
          stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Connection dots (API endpoints) -->
    <circle cx="-30" cy="-15" r="6" fill="white"/>
    <circle cx="-30" cy="0" r="6" fill="white"/>
    <circle cx="-30" cy="15" r="6" fill="white"/>

    <circle cx="30" cy="-15" r="6" fill="white"/>
    <circle cx="30" cy="0" r="6" fill="white"/>
    <circle cx="30" cy="15" r="6" fill="white"/>

    <!-- Connection lines -->
    <line x1="-24" y1="-15" x2="24" y2="-15" stroke="white" stroke-width="3" opacity="0.7"/>
    <line x1="-24" y1="0" x2="24" y2="0" stroke="white" stroke-width="3" opacity="0.7"/>
    <line x1="-24" y1="15" x2="24" y2="15" stroke="white" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Gear icon (Custom configuration) -->
  <g transform="translate(160, 50)">
    <circle cx="0" cy="0" r="12" fill="white"/>
    <circle cx="0" cy="0" r="6" fill="url(#customGrad)"/>
  </g>
</svg>
